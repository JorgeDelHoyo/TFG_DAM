<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpegio Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }

        /* Contenedor principal con scroll — AlphaTab lo controla para el auto-scroll del cursor */
        .at-container {
            height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            position: relative;
            background-color: #ffffff !important;
            -webkit-overflow-scrolling: touch;
        }

        #alphaTab {
            width: 100% !important;
            background: #ffffff;
            position: relative;
            padding-bottom: 300px;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            display: none;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
        }

        /* ============================================
           CURSOR NATIVO DE ALPHATAB (igual que GProTab.net)
           ============================================ */

        /* Barra de compás actual — fondo amarillo sutil */
        .at-cursor-bar {
            background: rgba(255, 242, 0, 0.12) !important;
        }

        /* Cursor de beat — línea roja vertical que avanza por cada nota */
        .at-cursor-beat {
            background: rgba(220, 0, 0, 0.7) !important;
            width: 3px !important;
        }

        /* Selección de notas */
        .at-selection div {
            background: rgba(64, 64, 255, 0.08) !important;
        }
    </style>
</head>
<body>

<!-- Contenedor con scroll que AlphaTab controlará para seguir al cursor -->
<div class="at-container" id="scroll-container">
    <div id="alphaTab"></div>
</div>
<div id="loading">Cargando partitura...</div>

<script>
    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    var api = null;
    var totalTicks = 0;
    var scoreDurationMs = 0;
    var VIDEO_TOTAL_DURATION = 180;
    var hasExternalDuration = false;
    var isPlayerReady = false;
    var pendingTrackIndex = 0;

    function debug(m) { console.log('[JS]', m); }

    // ============================================================
    // INICIALIZACIÓN DE ALPHATAB CON REPRODUCTOR Y CURSOR NATIVOS
    // (Mismo enfoque que GProTab.net / Songsterr)
    // ============================================================
    var scrollContainer = document.getElementById('scroll-container');

    api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
        player: {
            enablePlayer: true,
            enableCursor: true,
            scrollElement: scrollContainer,
            soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/soundfont/sonivox.sf2'
        },
        core: {
            fileReadUrl: 'https://appassets.androidplatform.net/assets/',
            includeNoteBounds: true
        },
        display: {
            layoutMode: 1 // Page layout
        }
    });

    // ============================================================
    // EVENTO: Partitura cargada en memoria
    // ============================================================
    api.scoreLoaded.on(function(score) {
        totalTicks = score.endTick || 0;
        scoreDurationMs = (score.duration || 60) * 1000;

        debug('🎵 Score cargado. Ticks: ' + totalTicks + ', Duración: ' + (scoreDurationMs/1000) + 's');

        if (!hasExternalDuration) {
            VIDEO_TOTAL_DURATION = scoreDurationMs / 1000;
            debug('⏱️ Usando duración del score: ' + VIDEO_TOTAL_DURATION + 's');
        }

        // Informar a Kotlin de la duración real
        try {
            if (typeof Android !== 'undefined' && Android.onDurationReady) {
                Android.onDurationReady(scoreDurationMs / 1000);
            }
        } catch(e) {}
    });

    // ============================================================
    // EVENTO: Renderizado visual completado
    // ============================================================
    api.renderFinished.on(function() {
        document.getElementById('loading').style.display = 'none';
        debug('✅ Render completado.');
    });

    // ============================================================
    // EVENTO: Reproductor listo (SoundFont cargado)
    // ============================================================
    api.playerReady.on(function() {
        isPlayerReady = true;
        // Mutear por defecto — para canciones YouTube no queremos doble audio.
        // Para locales, Kotlin llamará a unmute().
        api.masterVolume = 0;
        debug('🔊 Player listo (SoundFont cargado). Cursor nativo activo.');
    });

    // ============================================================
    // EVENTO: Posición del reproductor cambia (para debug / futuro uso)
    // ============================================================
    api.playerPositionChanged.on(function(e) {
        // e.currentTick, e.endTick, e.currentTime (ms), e.endTime (ms)
    });

    // ============================================================
    // API PÚBLICA — Llamadas desde Kotlin (Android Bridge)
    // ============================================================

    /**
     * Carga una canción. Si duration > 0, es una canción con YouTube (sync externo).
     * Si duration = 0 o no se pasa, es una canción local (AlphaTab maneja todo).
     */
    function loadSong(fileName, trackIndex, duration) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);

        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
        } else {
            hasExternalDuration = false;
        }

        document.getElementById('loading').style.display = 'block';
        isPlayerReady = false;

        var url = fileName.startsWith('http')
            ? fileName
            : 'https://appassets.androidplatform.net/assets/' + fileName.replace(/^\/+/, '');

        debug('📂 Cargando: ' + url + ', track: ' + pendingTrackIndex);
        api.load(url, [pendingTrackIndex]);
    }

    /**
     * FUNCIÓN CLAVE: Sincroniza el cursor nativo de AlphaTab con el tiempo del vídeo YouTube.
     * Convierte segundos → ticks y usa api.tickPosition para mover el cursor.
     * El cursor nativo de AlphaTab se mueve a nivel de BEAT (no de compás), igual que GProTab.net.
     */
    function correctAutoScrollTime(seconds) {
        if (!isPlayerReady || totalTicks <= 0 || VIDEO_TOTAL_DURATION <= 0) return;

        var progress = seconds / VIDEO_TOTAL_DURATION;
        if (progress < 0) progress = 0;
        if (progress > 1) progress = 1;

        var tick = Math.round(progress * totalTicks);
        api.tickPosition = tick;
    }

    /** Alias para compatibilidad con las llamadas existentes desde Kotlin */
    function updateScrollPosition(time) { correctAutoScrollTime(time); }
    function startAutoScroll(resumeTime) { correctAutoScrollTime(resumeTime); }
    function stopAutoScroll() { /* El cursor se queda donde está */ }

    /** Establece la duración total del vídeo de YouTube */
    function setVideoDuration(duration) {
        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
            debug('⏱️ Duración externa recibida: ' + VIDEO_TOTAL_DURATION + 's');
        }
    }

    /** Cambia la pista/instrumento visible */
    function changeTrack(trackIndex) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        if (api && api.score && api.score.tracks[pendingTrackIndex]) {
            api.renderTracks([api.score.tracks[pendingTrackIndex]]);
        }
    }

    // ============================================================
    // CONTROLES DE REPRODUCCIÓN LOCAL (para canciones .gp3 sin YouTube)
    // AlphaTab reproduce el audio del Guitar Pro → cursor + sonido
    // ============================================================

    /** Inicia la reproducción nativa de AlphaTab (audio del .gp3) */
    function playLocal() {
        if (isPlayerReady) {
            api.masterVolume = 1.0;
            api.play();
            debug('▶️ Reproducción local iniciada');
        }
    }

    /** Pausa la reproducción nativa */
    function pauseLocal() {
        if (isPlayerReady) {
            api.pause();
            debug('⏸️ Reproducción local pausada');
        }
    }

    /** Cambia la velocidad de reproducción (0.25 a 2.0) */
    function setPlaybackSpeed(speed) {
        var s = Number(speed) || 1.0;
        if (s < 0.25) s = 0.25;
        if (s > 2.0) s = 2.0;
        if (isPlayerReady) {
            api.playbackSpeed = s;
            debug('⚡ Velocidad: ' + s + 'x');
        }
    }

    /** Desmutea el audio de AlphaTab (para canciones locales) */
    function unmute() {
        if (api) api.masterVolume = 1.0;
    }

    /** Mutea el audio de AlphaTab (para canciones YouTube donde no queremos doble audio) */
    function mute() {
        if (api) api.masterVolume = 0;
    }

    /** Verifica si el reproductor está listo */
    function isReady() { return isPlayerReady; }
</script>
</body>
</html>
