<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpegio Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }

        .at-container {
            height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            position: relative;
            background-color: #ffffff !important;
            -webkit-overflow-scrolling: touch;
        }

        #alphaTab {
            width: 100% !important;
            background: #ffffff;
            position: relative;
            padding-bottom: 300px;
        }

        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 18px; display: none; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 8px;
        }

        /* ============================================
           CURSOR NATIVO DE ALPHATAB — estilo GProTab
           ============================================ */
        .at-cursor-bar {
            background: rgba(255, 242, 0, 0.12) !important;
        }
        .at-cursor-beat {
            background: rgba(220, 0, 0, 0.75) !important;
            width: 3px !important;
        }
        .at-selection div {
            background: rgba(64, 64, 255, 0.1) !important;
        }
    </style>
</head>
<body>

<div class="at-container" id="scroll-container">
    <div id="alphaTab"></div>
</div>
<div id="loading">Cargando partitura...</div>

<script>
    var api = null;
    var totalTicks = 96000;
    var VIDEO_TOTAL_DURATION = 180;
    var hasExternalDuration = false;
    var isPlayerReady = false;
    var pendingTrackIndex = 0;
    var pendingStartTime = -1;
    var resizeTimer = null;

    function debug(m) { console.log('[ARPEGIO]', m); }

    // ============================================================
    // ALPHATAB CON REPRODUCTOR Y CURSOR NATIVOS
    // ============================================================
    var scrollEl = document.getElementById('scroll-container');

    api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
        player: {
            enablePlayer: true,
            enableCursor: true,
            scrollElement: scrollEl,
            soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/soundfont/sonivox.sf2'
        },
        core: {
            fileReadUrl: 'https://appassets.androidplatform.net/assets/',
            includeNoteBounds: true
        },
        display: { layout: 'page', scrollMode: 'off' }
    });

    // ============================================================
    // SCORE CARGADO
    // ============================================================
    api.scoreLoaded.on(function(s) {
        totalTicks = s.endTick || 96000;
        var dur = s.duration || 60;
        debug('Score: ticks=' + totalTicks + ' dur=' + dur + 's');
        if (!hasExternalDuration) {
            VIDEO_TOTAL_DURATION = dur;
        }
    });

    // ============================================================
    // RENDER TERMINADO
    // ============================================================
    api.renderFinished.on(function() {
        document.getElementById('loading').style.display = 'none';
        debug('Render OK');
    });

    // ============================================================
    // REPRODUCTOR LISTO (SoundFont cargado)
    // Ahora sí podemos mover el cursor con api.tickPosition
    // ============================================================
    api.playerReady.on(function() {
        isPlayerReady = true;
        api.masterVolume = 0;  // SIEMPRE mudo — YouTube da el audio
        debug('Player LISTO. totalTicks=' + totalTicks + ' VIDEO_DUR=' + VIDEO_TOTAL_DURATION);

        // Si había un startAutoScroll pendiente, ejecutarlo ahora
        if (pendingStartTime >= 0) {
            debug('Ejecutando start pendiente: ' + pendingStartTime + 's');
            doStart(pendingStartTime);
            pendingStartTime = -1;
        }
    });

    // ============================================================
    // RESIZE → re-render
    // ============================================================
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            debug('Resize → re-render');
            api.render();
        }, 300);
    });

    // ============================================================
    // FUNCIONES INTERNAS
    // ============================================================

    /** Arranca el player mudo para que el cursor se active */
    function doStart(resumeTime) {
        api.masterVolume = 0;
        api.play();
        // Pequeño delay para que el player arranque, luego posicionar
        setTimeout(function() {
            if (resumeTime > 0) {
                moveCursorToTime(resumeTime);
            }
        }, 50);
    }

    /** Mueve el cursor nativo a un tiempo dado (segundos) */
    function moveCursorToTime(seconds) {
        if (!isPlayerReady || totalTicks <= 0 || VIDEO_TOTAL_DURATION <= 0) return;
        var progress = seconds / VIDEO_TOTAL_DURATION;
        if (progress < 0) progress = 0;
        if (progress > 1) progress = 1;
        var tick = Math.round(progress * totalTicks);
        api.tickPosition = tick;
    }

    // ============================================================
    // API PÚBLICA — Llamadas desde Kotlin
    // ============================================================

    function loadSong(fileName, trackIndex, duration) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        pendingStartTime = -1;

        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
        } else {
            hasExternalDuration = false;
        }

        document.getElementById('loading').style.display = 'block';
        isPlayerReady = false;

        var url = fileName.startsWith('http')
            ? fileName
            : 'https://appassets.androidplatform.net/assets/' + fileName.replace(/^\/+/, '');

        debug('Cargando: ' + url + ' track=' + pendingTrackIndex + ' dur=' + VIDEO_TOTAL_DURATION);
        api.load(url, [pendingTrackIndex]);
    }

    /** Kotlin llama esto cada frame (~60fps) con el tiempo del vídeo YouTube */
    function correctAutoScrollTime(seconds) {
        moveCursorToTime(seconds);
    }

    /** Cuando el usuario pulsa play: arrancar player mudo */
    function startAutoScroll(resumeTime) {
        var t = Number(resumeTime) || 0;
        if (isPlayerReady) {
            doStart(t);
        } else {
            // SoundFont aún cargando — encolar para cuando esté listo
            pendingStartTime = t;
            debug('Player no listo, encolando start para t=' + t);
        }
    }

    /** Cuando el usuario pulsa pausa */
    function stopAutoScroll() {
        pendingStartTime = -1;
        if (isPlayerReady) {
            api.pause();
        }
    }

    function updateScrollPosition(t) { correctAutoScrollTime(t); }

    function setVideoDuration(duration) {
        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
            debug('Duración externa: ' + VIDEO_TOTAL_DURATION + 's');
        }
    }

    function changeTrack(trackIndex) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        if (api && api.score && api.score.tracks[pendingTrackIndex]) {
            api.renderTracks([api.score.tracks[pendingTrackIndex]]);
        }
    }

    function isReady() { return isPlayerReady; }
</script>
</body>
</html>
