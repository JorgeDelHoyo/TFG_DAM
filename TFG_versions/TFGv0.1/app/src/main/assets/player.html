<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arpegio Player</title>

    <!-- ✅ AlphaTab 1.6.0 (versión fija, sin MIME issues) -->
    <!-- CSS opcional: alphaTab aplica estilos base por defecto -->
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.6.0/dist/alphaTab.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        #partitura {
            width: 100%;
            height: 100vh;
            overflow: auto;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 18px;
            display: none;
        }
    </style>
</head>
<body>
<div id="partitura"></div>
<div id="loading">Cargando partitura...</div>

<script>
    let alphaTabApi = null;
    let currentFileName = null;
    let isInitialized = false;
    let pendingTrackIndex = 0;

    async function loadSong(fileName, trackIndex = 0) {
        console.log('[JS] loadSong llamado: ' + fileName);
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        document.getElementById('loading').style.display = 'block';
        isInitialized = false;

        try {
            if (alphaTabApi) {
                alphaTabApi.destroy();
                alphaTabApi = null;
            }

            const assetUrl = fileName.startsWith('file://')
                ? fileName
                : 'file:///android_asset/' + fileName.replace(/^\/+/, '');

            const settings = {
                player: {
                    enable: false,
                    soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.6.0/dist/soundfont/sonivox.sf2'
                },
                display: {
                    layoutMode: 'horizontal',
                    stretchForce: 0.5,
                    cursorMode: 1
                },
                core: {
                    enableCursor: true,
                    scrollMode: 1
                }
            };

            const container = document.getElementById('partitura');
            container.innerHTML = '';
            alphaTabApi = new alphaTab.AlphaTabApi(container, settings);

            // ✅ Eventos compatibles con 1.6.0: usar .on() en lugar de .subscribe()
            if (typeof alphaTabApi.scoreLoaded?.on === 'function') {
                alphaTabApi.scoreLoaded.on((score) => {
                    console.log('[JS] Score cargado: ' + score.title + ' / pistas: ' + score.tracks.length);
                    renderTrack(pendingTrackIndex);
                });
            }
            if (typeof alphaTabApi.renderFinished?.on === 'function') {
                alphaTabApi.renderFinished.on(() => {
                    console.log('[JS] Renderizado completado');
                    document.getElementById('loading').style.display = 'none';
                    isInitialized = true;
                });
            }
            if (typeof alphaTabApi.error?.on === 'function') {
                alphaTabApi.error.on((err) => {
                    console.error('[JS] Error en alphaTab:', err);
                    document.getElementById('loading').style.display = 'none';
                });
            }

            const response = await fetch(assetUrl);
            if (!response.ok) {
                throw new Error('No se pudo cargar ' + assetUrl + ' HTTP ' + response.status);
            }

            const data = await response.arrayBuffer();
            console.log('[JS] Archivo leído: ' + data.byteLength + ' bytes');

            // ✅ load() en 1.6.0+ puede retornar Promise: encadenamos para mayor seguridad
            const loadResult = alphaTabApi.load(data, [pendingTrackIndex]);
            console.log('[JS] alphaTabApi.load iniciado');

            if (loadResult && typeof loadResult.then === 'function') {
                await loadResult;
                console.log('[JS] Load Promise resuelta');
            }

            currentFileName = fileName;
            console.log('[JS] alphaTab inicializado para: ' + assetUrl);

        } catch (e) {
            console.error('[JS] Error cargando canción:', e);
            document.getElementById('loading').style.display = 'none';
        }
    }

    function changeTrack(trackIndex) {
        console.log('[JS] changeTrack llamado: índice ' + trackIndex);
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);

        if (!alphaTabApi) {
            console.warn('[JS] ⚠️ alphaTab no inicializado aún');
            return;
        }

        renderTrack(pendingTrackIndex);
    }

    function renderTrack(trackIndex) {
        try {
            if (!alphaTabApi.score) {
                console.warn('[JS] ⚠️ Score no cargado aún');
                return;
            }

            const tracks = alphaTabApi.score.tracks;
            if (!tracks || tracks.length === 0) {
                console.warn('[JS] ⚠️ No hay pistas disponibles');
                return;
            }

            const safeIndex = Math.max(0, Math.min(trackIndex, tracks.length - 1));
            alphaTabApi.renderTracks([tracks[safeIndex]]);
            console.log('[JS] Pista renderizada: ' + safeIndex);

        } catch (e) {
            console.error('[JS] Error cambiando pista:', e);
        }
    }

    function togglePlay() {
        if (alphaTabApi?.player) {
            alphaTabApi.player.playPause();
            console.log('[JS] Play/Pause toggled');
        }
    }

    function seekTo(seconds) {
        if (alphaTabApi?.player) {
            alphaTabApi.player.seekTo(seconds * 1000);
            console.log('[JS] Seek to: ' + seconds + 's');
        }
    }

    function isReady() {
        return isInitialized && alphaTabApi !== null;
    }

    console.log('[JS] player.html cargado - funciones disponibles: loadSong, changeTrack, togglePlay, seekTo');
</script>
</body>
</html>
