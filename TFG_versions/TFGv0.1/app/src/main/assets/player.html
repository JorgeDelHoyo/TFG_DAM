<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpegio Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }

        .at-container {
            height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            position: relative;
            background-color: #ffffff !important;
            -webkit-overflow-scrolling: touch;
        }

        #alphaTab {
            width: 100% !important;
            background: #ffffff;
            position: relative;
            padding-bottom: 300px;
        }

        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 18px; display: none; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 8px;
        }

        /* =============================================
           FORZAR VISIBILIDAD DEL CURSOR NATIVO
           AlphaTab oculta el cursor cuando no está en
           estado "playing". Con !important lo forzamos
           visible para poder moverlo con tickPosition
           sin necesidad de api.play().
           ============================================= */
        .at-cursor-wrapper {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .at-cursor-bar {
            display: block !important;
            background: rgba(255, 242, 0, 0.12) !important;
        }
        .at-cursor-beat {
            display: block !important;
            background: rgba(220, 0, 0, 0.75) !important;
            width: 3px !important;
        }
        .at-selection div {
            background: rgba(64, 64, 255, 0.08) !important;
        }
    </style>
</head>
<body>

<div class="at-container" id="scroll-container">
    <div id="alphaTab"></div>
</div>
<div id="loading">Cargando partitura...</div>

<script>
    var api = null;
    var totalTicks = 96000;
    var VIDEO_TOTAL_DURATION = 180;
    var hasExternalDuration = false;
    var isPlayerReady = false;
    var pendingTrackIndex = 0;
    var resizeTimer = null;
    var lastCursorY = -1;
    var userScrolling = false;
    var userScrollTimer = null;

    function debug(m) { console.log('[ARPEGIO]', m); }

    // ============================================================
    // ALPHATAB CON PLAYER + CURSOR NATIVO
    // ============================================================
    var scrollEl = document.getElementById('scroll-container');

    api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
        player: {
            enablePlayer: true,
            enableCursor: true,
            scrollElement: scrollEl,
            soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/soundfont/sonivox.sf2'
        },
        core: {
            fileReadUrl: 'https://appassets.androidplatform.net/assets/',
            includeNoteBounds: true
        },
        display: { layout: 'page', scrollMode: 'off' }
    });

    // ============================================================
    // SCORE CARGADO
    // ============================================================
    api.scoreLoaded.on(function(s) {
        totalTicks = s.endTick || 96000;
        var dur = s.duration || 60;
        debug('Score: ticks=' + totalTicks + ' dur=' + dur + 's');
        if (!hasExternalDuration) {
            VIDEO_TOTAL_DURATION = dur;
            debug('Usando duracion del score: ' + VIDEO_TOTAL_DURATION + 's');
        } else {
            debug('Usando duracion externa: ' + VIDEO_TOTAL_DURATION + 's');
        }
    });

    // ============================================================
    // RENDER TERMINADO
    // ============================================================
    api.renderFinished.on(function() {
        document.getElementById('loading').style.display = 'none';
        debug('Render OK');
    });

    // ============================================================
    // PLAYER LISTO (SoundFont cargado, cursor creado)
    // NO llamamos api.play() — movemos el cursor solo con tickPosition
    // ============================================================
    api.playerReady.on(function() {
        isPlayerReady = true;
        api.masterVolume = 0;
        debug('Player LISTO. Cursor nativo activo.');
        debug('totalTicks=' + totalTicks + ' VIDEO_DUR=' + VIDEO_TOTAL_DURATION);
    });

    // ============================================================
    // DETECTAR SCROLL MANUAL DEL USUARIO
    // ============================================================
    scrollEl.addEventListener('touchstart', function() {
        userScrolling = true;
        clearTimeout(userScrollTimer);
    }, { passive: true });

    scrollEl.addEventListener('touchend', function() {
        clearTimeout(userScrollTimer);
        userScrollTimer = setTimeout(function() { userScrolling = false; }, 4000);
    }, { passive: true });

    // ============================================================
    // RESIZE → re-render
    // ============================================================
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            debug('Resize -> re-render');
            lastCursorY = -1;
            api.render();
        }, 300);
    });

    // ============================================================
    // SCROLL MANUAL: mover vista al cursor si cambia de renglón
    // (AlphaTab solo hace auto-scroll en estado "playing",
    //  así que lo hacemos nosotros)
    // ============================================================
    function scrollToCursorIfNeeded() {
        if (userScrolling) return;

        var beat = document.querySelector('.at-cursor-beat');
        if (!beat) return;

        var beatTop = beat.offsetTop;
        // Solo scrollear al cambiar de renglón (salto significativo en Y)
        if (Math.abs(beatTop - lastCursorY) > 50) {
            lastCursorY = beatTop;
            var viewH = scrollEl.clientHeight;
            var scrollTop = scrollEl.scrollTop;

            // Solo si el cursor sale de la zona visible
            if (beatTop < scrollTop + 40 || beatTop > scrollTop + viewH - 100) {
                scrollEl.scrollTo({
                    top: Math.max(0, beatTop - 80),
                    behavior: 'smooth'
                });
            }
        }
    }

    // ============================================================
    // API PÚBLICA — Llamadas desde Kotlin
    // ============================================================

    function loadSong(fileName, trackIndex, duration) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        lastCursorY = -1;

        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
        } else {
            hasExternalDuration = false;
        }

        document.getElementById('loading').style.display = 'block';
        isPlayerReady = false;

        var url = fileName.startsWith('http')
            ? fileName
            : 'https://appassets.androidplatform.net/assets/' + fileName.replace(/^\/+/, '');

        debug('Cargando: ' + url + ' track=' + pendingTrackIndex + ' dur=' + VIDEO_TOTAL_DURATION);
        api.load(url, [pendingTrackIndex]);
    }

    /**
     * Mueve el cursor nativo a la posición correspondiente al tiempo dado.
     * Llamado ~60fps desde Kotlin con el tiempo del vídeo YouTube.
     * SIN api.play() → sin reloj interno → sin conflictos.
     */
    function correctAutoScrollTime(seconds) {
        if (!isPlayerReady || totalTicks <= 0 || VIDEO_TOTAL_DURATION <= 0) return;

        var progress = Math.max(0, Math.min(1, seconds / VIDEO_TOTAL_DURATION));
        var tick = Math.round(progress * totalTicks);
        api.tickPosition = tick;

        // Scroll manual (AlphaTab no scrollea sin play())
        scrollToCursorIfNeeded();
    }

    function updateScrollPosition(t) { correctAutoScrollTime(t); }
    function startAutoScroll(t) { correctAutoScrollTime(Number(t) || 0); }
    function stopAutoScroll() { /* cursor se queda donde está */ }

    function setVideoDuration(duration) {
        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
            debug('Duracion externa: ' + VIDEO_TOTAL_DURATION + 's');
        }
    }

    function changeTrack(trackIndex) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        if (api && api.score && api.score.tracks[pendingTrackIndex]) {
            lastCursorY = -1;
            api.renderTracks([api.score.tracks[pendingTrackIndex]]);
        }
    }

    function isReady() { return isPlayerReady; }
</script>
</body>
</html>
