<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #alphaTab { width: 100%; height: 100vh; }

        /* Botón flotante */
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        button {
            background: #ff4081; /* Color rosa */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="controls">
    <button id="playBtn" disabled>Cargando...</button>
</div>

<div id="alphaTab"></div>

<script>
    let api;

    function loadSong(fileName) {
        const element = document.getElementById('alphaTab');
        const playBtn = document.getElementById('playBtn');

        const settings = {
            file: fileName,
            core: { engine: 'html5' },
            display: { layoutMode: 'page', staveProfile: 'default' },
            player: {
                enablePlayer: true,
                enableCursor: true,
                // Usamos el soundfont básico solo para que el motor arranque
                soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2'
            }
        };

        api = new alphaTab.AlphaTabApi(element, settings);

        api.soundFontLoad.on(() => {
            playBtn.innerText = "▶ Start Tab";
            playBtn.disabled = false;

            // 🤫 EL TRUCO DE MAGIA: SILENCIAR EL MIDI 🤫
            api.masterVolume = 0;
        });

        playBtn.onclick = () => {
            api.playPause();
        };

        api.playerStateChanged.on((e) => {
            playBtn.innerText = e.state === 1 ? "⏸ Stop Tab" : "▶ Start Tab";
        });
    }
</script>
</body>
</html>
