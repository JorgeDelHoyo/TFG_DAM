<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpegio Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/alphaTab.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }

        .at-container {
            height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            position: relative;
            background-color: #ffffff !important;
            -webkit-overflow-scrolling: touch;
        }

        #alphaTab {
            width: 100% !important;
            background: #ffffff;
            position: relative;
            padding-bottom: 300px;
        }

        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 18px; display: none; z-index: 10;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 8px;
        }

        /* =============================================
           FORZAR VISIBILIDAD DEL CURSOR NATIVO
           AlphaTab oculta el cursor cuando no está en
           estado "playing". Con !important lo forzamos
           visible para poder moverlo con tickPosition
           sin necesidad de api.play().
           ============================================= */
        .at-cursor-wrapper {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .at-cursor-bar {
            display: block !important;
            background: rgba(255, 242, 0, 0.12) !important;
        }
        .at-cursor-beat {
            display: block !important;
            background: rgba(220, 0, 0, 0.75) !important;
            width: 3px !important;
        }
        .at-selection div {
            background: rgba(64, 64, 255, 0.08) !important;
        }
    </style>
</head>
<body>

<div class="at-container" id="scroll-container">
    <div id="alphaTab"></div>
</div>
<div id="loading">Cargando partitura...</div>

<script>
    var api = null;
    var totalTicks = 96000;
    var VIDEO_TOTAL_DURATION = 180;
    var hasExternalDuration = false;
    var isPlayerReady = false;
    var pendingTrackIndex = 0;
    var resizeTimer = null;
    var lastCursorY = -1;
    var userScrolling = false;
    var userScrollTimer = null;

    function debug(m) { console.log('[ARPEGIO]', m); }

    // ============================================================
    // ALPHATAB CON PLAYER + CURSOR NATIVO
    // ============================================================
    var scrollEl = document.getElementById('scroll-container');

    api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
        player: {
            enablePlayer: true,
            enableCursor: true,
            scrollElement: scrollEl,
            soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0/dist/soundfont/sonivox.sf2'
        },
        core: {
            fileReadUrl: 'https://appassets.androidplatform.net/assets/',
            includeNoteBounds: true
        },
        display: { layout: 'page', scrollMode: 'off' }
    });

    // ============================================================
    // CALCULAR TICKS REALES DESDE MASTER BARS
    // score.endTick no existe en AlphaTab 1.3.0, así que lo
    // calculamos manualmente desde los masterBars del score.
    // ============================================================
    function computeTotalTicks(score) {
        if (!score.masterBars || score.masterBars.length === 0) return 96000;

        var bars = score.masterBars;
        var lastBar = bars[bars.length - 1];

        // Opción 1: si el último bar tiene .start, usarlo + duración del bar
        if (typeof lastBar.start === 'number' && lastBar.start > 0) {
            var num = lastBar.timeSignatureNumerator || 4;
            var den = lastBar.timeSignatureDenominator || 4;
            var barTicks = num * (960 * 4 / den);
            var total = lastBar.start + barTicks;
            debug('totalTicks via lastBar.start: ' + total + ' (bars=' + bars.length + ')');
            return total;
        }

        // Opción 2: sumar la duración en ticks de cada bar
        var total = 0;
        for (var i = 0; i < bars.length; i++) {
            var num = bars[i].timeSignatureNumerator || 4;
            var den = bars[i].timeSignatureDenominator || 4;
            total += num * (960 * 4 / den);
        }
        debug('totalTicks via suma: ' + total + ' (bars=' + bars.length + ')');
        return total;
    }

    // ============================================================
    // CALCULAR DURACIÓN REAL EN SEGUNDOS DESDE TEMPOS
    // Itera cada masterBar teniendo en cuenta los cambios de tempo
    // (tempoAutomation) para convertir ticks → segundos reales.
    // ============================================================
    function computeRealDuration(score) {
        if (!score.masterBars || score.masterBars.length === 0) return 180;

        var bars = score.masterBars;
        var currentBPM = 120; // fallback
        var totalSeconds = 0;

        // Buscar tempo inicial en score.tempo
        if (score.tempo && score.tempo > 0) {
            currentBPM = score.tempo;
        }

        for (var i = 0; i < bars.length; i++) {
            var bar = bars[i];

            // Detectar cambio de tempo en este compás
            if (bar.tempoAutomation && bar.tempoAutomation.value > 0) {
                currentBPM = bar.tempoAutomation.value;
            }

            // Calcular duración de este compás en segundos
            var num = bar.timeSignatureNumerator || 4;
            var den = bar.timeSignatureDenominator || 4;
            // Beats = numerador * (4/denominador) → negras equivalentes
            var beatsInBar = num * (4 / den);
            var secondsInBar = (beatsInBar / currentBPM) * 60;
            totalSeconds += secondsInBar;
        }

        debug('Duración real calculada: ' + totalSeconds.toFixed(1) + 's (' + bars.length + ' bars, ultimo BPM=' + currentBPM + ')');
        return totalSeconds;
    }

    // ============================================================
    // SCORE CARGADO
    // ============================================================
    api.scoreLoaded.on(function(s) {
        // Intentar endTick nativo, si no existe → calcular
        if (s.endTick && s.endTick > 0) {
            totalTicks = s.endTick;
            debug('totalTicks via endTick: ' + totalTicks);
        } else {
            totalTicks = computeTotalTicks(s);
        }

        // Calcular duración REAL desde tempos del score
        var realDuration = computeRealDuration(s);
        debug('Score: ticks=' + totalTicks + ' realDur=' + realDuration.toFixed(1) + 's bars=' + (s.masterBars ? s.masterBars.length : '?'));

        if (!hasExternalDuration) {
            VIDEO_TOTAL_DURATION = realDuration;
            debug('Usando duracion calculada del score: ' + VIDEO_TOTAL_DURATION + 's');
        } else {
            debug('Usando duracion externa: ' + VIDEO_TOTAL_DURATION + 's');
        }

        // Exponer info para que Kotlin pueda leerla
        window.totalDuration = VIDEO_TOTAL_DURATION;
        window.scoreBPM = s.tempo || 120;
    });

    // ============================================================
    // RENDER TERMINADO
    // ============================================================
    api.renderFinished.on(function() {
        document.getElementById('loading').style.display = 'none';
        debug('Render OK');
    });

    // ============================================================
    // PLAYER LISTO (SoundFont cargado, cursor creado)
    // NO llamamos api.play() — movemos el cursor solo con tickPosition
    // ============================================================
    api.playerReady.on(function() {
        isPlayerReady = true;
        api.masterVolume = 0;
        debug('Player LISTO. Cursor nativo activo.');
        debug('totalTicks=' + totalTicks + ' VIDEO_DUR=' + VIDEO_TOTAL_DURATION);
    });

    // ============================================================
    // DETECTAR SCROLL MANUAL DEL USUARIO
    // ============================================================
    scrollEl.addEventListener('touchstart', function() {
        userScrolling = true;
        clearTimeout(userScrollTimer);
    }, { passive: true });

    scrollEl.addEventListener('touchend', function() {
        clearTimeout(userScrollTimer);
        userScrollTimer = setTimeout(function() { userScrolling = false; }, 4000);
    }, { passive: true });

    // ============================================================
    // RESIZE → re-render
    // ============================================================
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            debug('Resize -> re-render');
            lastCursorY = -1;
            api.render();
        }, 300);
    });

    // ============================================================
    // AUTO-SCROLL: mantener el cursor visible en pantalla
    // Usa getBoundingClientRect() para posición real en viewport
    // ============================================================
    function scrollToCursorIfNeeded() {
        if (userScrolling) return;

        var beat = document.querySelector('.at-cursor-beat');
        if (!beat) return;

        var rect = beat.getBoundingClientRect();
        var containerRect = scrollEl.getBoundingClientRect();
        var cursorRelativeTop = rect.top - containerRect.top;
        var viewH = containerRect.height;

        // Si el cursor está en el 30% inferior o por encima de la vista → scrollear
        if (cursorRelativeTop > viewH * 0.65 || cursorRelativeTop < 0) {
            // Calcular posición absoluta del cursor en el contenido
            var absoluteTop = scrollEl.scrollTop + cursorRelativeTop;
            scrollEl.scrollTo({
                top: Math.max(0, absoluteTop - viewH * 0.2),
                behavior: 'smooth'
            });
        }
    }

    // ============================================================
    // API PÚBLICA — Llamadas desde Kotlin
    // ============================================================

    function loadSong(fileName, trackIndex, duration) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        lastCursorY = -1;

        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
        } else {
            hasExternalDuration = false;
        }

        document.getElementById('loading').style.display = 'block';
        isPlayerReady = false;

        var url = fileName.startsWith('http')
            ? fileName
            : 'https://appassets.androidplatform.net/assets/' + fileName.replace(/^\/+/, '');

        debug('Cargando: ' + url + ' track=' + pendingTrackIndex + ' dur=' + VIDEO_TOTAL_DURATION);
        api.load(url, [pendingTrackIndex]);
    }

    /**
     * Mueve el cursor nativo a la posición correspondiente al tiempo dado.
     * Llamado ~60fps desde Kotlin con el tiempo del vídeo YouTube.
     * SIN api.play() → sin reloj interno → sin conflictos.
     */
    function correctAutoScrollTime(seconds) {
        if (!isPlayerReady) return;

        // Usamos el motor de tiempo interno de AlphaTab (en milisegundos).
        // Esto respeta perfectamente los cambios de BPM y métrica de la partitura
        // en lugar de hacer una interpolación lineal inexacta.
        var timeMs = Math.max(0, seconds * 1000);
        api.timePosition = timeMs;

        // Scroll manual (AlphaTab no scrollea automáticamente sin llamar a play())
        scrollToCursorIfNeeded();
    }

    function updateScrollPosition(t) { correctAutoScrollTime(t); }
    function startAutoScroll(t) { correctAutoScrollTime(Number(t) || 0); }
    function stopAutoScroll() { /* cursor se queda donde está */ }

    function setVideoDuration(duration) {
        if (duration && Number(duration) > 0) {
            VIDEO_TOTAL_DURATION = Number(duration);
            hasExternalDuration = true;
            debug('Duracion externa: ' + VIDEO_TOTAL_DURATION + 's');
        }
    }

    function changeTrack(trackIndex) {
        pendingTrackIndex = Math.max(0, Number(trackIndex) || 0);
        if (api && api.score && api.score.tracks[pendingTrackIndex]) {
            lastCursorY = -1;
            api.renderTracks([api.score.tracks[pendingTrackIndex]]);
        }
    }

    // ============================================================
    // REPRODUCCIÓN NATIVA (Para Canciones Locales)
    // ============================================================

    function playNative() {
        if (api && isPlayerReady) {
            api.play();
        }
    }

    function pauseNative() {
        if (api && isPlayerReady) {
            api.pause();
        }
    }

    function setPlaybackSpeed(speed) {
        if (api && isPlayerReady) {
            api.playbackSpeed = Number(speed);
        }
    }

    function isReady() { return isPlayerReady; }
</script>
</body>
</html>
